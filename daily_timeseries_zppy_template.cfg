[default]
input     = /global/cfs/cdirs/e3smdata/simulations/v3.XLE/{casename}
output    = /global/cfs/cdirs/e3smdata/simulations/v3.XLE/{casename}
case      = {casename}
www       = /global/cfs/cdirs/e3sm/www/beharrop/E3SMv3
campaign  = "water_cycle"
machine   = pm-cpu
partition = regular
account   = e3sm
environment_commands = "source /global/common/software/e3sm/anaconda_envs/load_latest_e3sm_unified_pm-cpu.sh"

[ts]
active   = True
years    = "1985:2024:5"
walltime = "0:05:00"

  [[ atm_daily_180x360_aave ]]
  input_subdir = "archive/atm/hist"
  input_files  = "eam.h1"
  mapping_file = /global/cfs/cdirs/e3sm/diagnostics/maps/map_ne30pg2_to_cmip6_180x360_aave.20200201.nc
  frequency    = "daily"
  vars         = "TREFHT,TREFHTMX,TREFHTMN"

  [[ atm_daily_native ]]
  input_subdir = "archive/atm/hist"
  input_files  = "eam.h1"
  mapping_file = ""
  frequency    = "daily"
  vars         = "PRECT,TREFHT,TREFHTMN,TREFHTMX"